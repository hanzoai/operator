---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: hanzogateways.hanzo.ai
spec:
  group: hanzo.ai
  names:
    kind: HanzoGateway
    listKind: HanzoGatewayList
    plural: hanzogateways
    shortNames:
    - hgw
    singular: hanzogateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.routeCount
      name: Routes
      type: integer
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HanzoGateway is the Schema for the hanzogateways API.
          It models an API gateway with routing, rate limiting, and authentication.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HanzoGatewaySpec defines the desired state of HanzoGateway.
            properties:
              authPolicies:
                description: AuthPolicies defines authentication policies referenced
                  by routes.
                items:
                  description: AuthPolicy defines an authentication policy for gateway
                    routes.
                  properties:
                    iamEndpoint:
                      description: IAMEndpoint is the IAM server URL (used with oidc
                        and jwt types).
                      type: string
                    jwksURL:
                      description: JWKSURL is the JSON Web Key Set URL for JWT validation.
                      type: string
                    name:
                      description: Name uniquely identifies this auth policy.
                      type: string
                    type:
                      description: Type selects the authentication mechanism.
                      enum:
                      - jwt
                      - apikey
                      - oidc
                      - none
                      type: string
                  required:
                  - name
                  - type
                  type: object
                type: array
              image:
                description: Image defines the container image for the gateway.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines when to pull the image.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  repository:
                    description: Repository is the container image repository.
                    type: string
                  tag:
                    default: latest
                    description: Tag is the container image tag.
                    type: string
                required:
                - repository
                type: object
              ingress:
                description: Ingress configures external access via an Ingress resource.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations are additional annotations applied to
                      the Ingress resource.
                    type: object
                  clusterIssuer:
                    default: letsencrypt-prod
                    description: ClusterIssuer is the cert-manager ClusterIssuer to
                      use for TLS certificates.
                    type: string
                  enabled:
                    description: Enabled controls whether an Ingress resource is created.
                    type: boolean
                  hosts:
                    description: Hosts lists the hostnames for the Ingress.
                    items:
                      type: string
                    type: array
                  ingressClassName:
                    default: ingress
                    description: IngressClassName specifies the Ingress class to use.
                    type: string
                  pathRules:
                    description: PathRules defines per-path routing rules.
                    items:
                      description: PathRule defines a single path-based routing rule
                        within an Ingress.
                      properties:
                        path:
                          description: Path is the URL path to match.
                          type: string
                        pathType:
                          description: PathType specifies how the path is matched.
                          enum:
                          - Exact
                          - Prefix
                          - ImplementationSpecific
                          type: string
                        port:
                          description: Port is the backend service port for this path.
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                      required:
                      - path
                      - pathType
                      - port
                      type: object
                    type: array
                  tls:
                    default: true
                    description: TLS enables TLS termination on the Ingress.
                    type: boolean
                  zeroTrustPolicy:
                    description: ZeroTrustPolicy configures zero-trust access control
                      on the Ingress.
                    properties:
                      allowedDomains:
                        description: AllowedDomains lists email domains permitted
                          access.
                        items:
                          type: string
                        type: array
                      allowedEmails:
                        description: AllowedEmails lists email addresses permitted
                          access.
                        items:
                          type: string
                        type: array
                      allowedGroups:
                        description: AllowedGroups lists IAM groups permitted access.
                        items:
                          type: string
                        type: array
                      enabled:
                        description: Enabled controls whether zero-trust policy is
                          enforced.
                        type: boolean
                      iamEndpoint:
                        description: IAMEndpoint is the identity provider endpoint
                          used for verification.
                        type: string
                      sessionDuration:
                        default: 24h
                        description: SessionDuration controls how long a session remains
                          valid.
                        type: string
                    type: object
                type: object
              rateLimits:
                description: RateLimits defines global rate limit configurations.
                items:
                  description: RateLimit defines rate limiting parameters.
                  properties:
                    clientMaxRate:
                      description: ClientMaxRate is the per-client rate limit within
                        the window.
                      format: int32
                      minimum: 1
                      type: integer
                    every:
                      description: Every defines the sliding window duration (e.g.
                        "1m", "1h").
                      type: string
                    maxRate:
                      description: MaxRate is the maximum number of requests allowed
                        in the window.
                      format: int32
                      minimum: 1
                      type: integer
                    name:
                      description: Name identifies this rate limit configuration.
                      type: string
                  required:
                  - every
                  - maxRate
                  - name
                  type: object
                type: array
              replicas:
                default: 2
                description: Replicas is the desired number of gateway replicas.
                format: int32
                minimum: 1
                type: integer
              resources:
                description: Resources configures CPU and memory requests/limits.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Limits describes the maximum amount of compute resources
                      allowed.
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Requests describes the minimum amount of compute
                      resources required.
                    type: object
                type: object
              routes:
                description: Routes defines the routing table for the gateway.
                items:
                  description: GatewayRoute defines a single route in the API gateway.
                  properties:
                    authPolicy:
                      description: |-
                        AuthPolicy names the AuthPolicy to apply to this route.
                        Must reference an AuthPolicy defined in the gateway spec.
                      type: string
                    backend:
                      description: Backend is the target Kubernetes Service name (or
                        name:port).
                      type: string
                    methods:
                      description: |-
                        Methods restricts the route to the listed HTTP methods.
                        An empty list matches all methods.
                      items:
                        type: string
                      type: array
                    prefix:
                      description: Prefix is the URL path prefix to match.
                      type: string
                    rateLimit:
                      description: RateLimit applies per-route rate limiting. Overrides
                        global rate limits.
                      properties:
                        clientMaxRate:
                          description: ClientMaxRate is the per-client rate limit
                            within the window.
                          format: int32
                          minimum: 1
                          type: integer
                        every:
                          description: Every defines the sliding window duration (e.g.
                            "1m", "1h").
                          type: string
                        maxRate:
                          description: MaxRate is the maximum number of requests allowed
                            in the window.
                          format: int32
                          minimum: 1
                          type: integer
                        name:
                          description: Name identifies this rate limit configuration.
                          type: string
                      required:
                      - every
                      - maxRate
                      - name
                      type: object
                    stripPrefix:
                      description: StripPrefix removes the matched prefix before forwarding
                        to the backend.
                      type: boolean
                  required:
                  - backend
                  - prefix
                  type: object
                type: array
              serviceMonitor:
                description: ServiceMonitor configures Prometheus metrics scraping.
                properties:
                  enabled:
                    default: false
                    description: Enabled controls whether a ServiceMonitor is created.
                    type: boolean
                  interval:
                    default: 30s
                    description: Interval defines how frequently Prometheus scrapes
                      the metrics endpoint.
                    type: string
                  metricsPath:
                    default: /metrics
                    description: MetricsPath is the HTTP path to scrape for metrics.
                    type: string
                  metricsPort:
                    default: metrics
                    description: MetricsPort is the named port to scrape metrics from.
                    type: string
                type: object
            type: object
          status:
            description: HanzoGatewayStatus defines the observed state of HanzoGateway.
            properties:
              conditions:
                description: Conditions represent the latest observations of the gateway's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase of the gateway.
                enum:
                - Pending
                - Creating
                - Running
                - Degraded
                - Deleting
                type: string
              readyReplicas:
                description: ReadyReplicas is the number of replicas that have passed
                  readiness checks.
                format: int32
                type: integer
              routeCount:
                description: RouteCount is the number of routes currently configured.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
