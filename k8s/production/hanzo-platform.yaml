apiVersion: hanzo.ai/v1alpha1
kind: HanzoPlatform
metadata:
  name: hanzo-production
  namespace: hanzo
  labels:
    app.kubernetes.io/name: hanzo-platform
    app.kubernetes.io/instance: production
    app.kubernetes.io/managed-by: hanzo-operator
spec:
  labels:
    app.kubernetes.io/part-of: hanzo-platform
    environment: production

  networkPolicies:
    defaultDeny: true

  # ---------------------------------------------------------------------------
  # Datastores (StatefulSets)
  # ---------------------------------------------------------------------------
  datastores:
    # -- PostgreSQL with pgvector --
    - name: sql
      spec:
        type: postgresql
        image:
          repository: ghcr.io/hanzoai/sql
          tag: 18-alpine
          pullPolicy: IfNotPresent
        replicas: 1
        storage:
          storageClassName: do-block-storage
          size: 50Gi
          retentionPolicy: Retain
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
        credentialsSecret: sql-credentials
        kmsSecrets:
          - hostAPI: https://kms.hanzo.ai/api
            projectSlug: hanzo
            envSlug: production
            secretsPath: /sql
            credentialsRef:
              name: kms-credentials
              namespace: hanzo
            resyncInterval: 60
            managedSecretName: sql-credentials
        serviceAliases:
          - postgres
        backup:
          enabled: true
          schedule: "0 2 * * *"
          retentionDays: 30
        partOf: hanzo-platform

    # -- Valkey (Redis-compatible) --
    - name: kv
      spec:
        type: valkey
        image:
          repository: ghcr.io/hanzoai/kv
          tag: latest
          pullPolicy: Always
        replicas: 1
        storage:
          storageClassName: do-block-storage
          size: 10Gi
          retentionPolicy: Retain
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        serviceAliases:
          - redis-master
        partOf: hanzo-platform

    # -- Datastore (ClickHouse-compatible analytics) --
    - name: datastore
      spec:
        type: datastore
        image:
          repository: ghcr.io/hanzoai/datastore
          tag: latest
          pullPolicy: Always
        replicas: 1
        storage:
          storageClassName: do-block-storage
          size: 100Gi
          retentionPolicy: Retain
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
        ports:
          - name: http
            containerPort: 8123
        backup:
          enabled: true
          schedule: "0 3 * * *"
          retentionDays: 30
        partOf: hanzo-platform

    # -- NATS messaging --
    - name: nats
      spec:
        type: nats
        image:
          repository: nats
          tag: 2-alpine
          pullPolicy: IfNotPresent
        replicas: 1
        storage:
          storageClassName: do-block-storage
          size: 5Gi
          retentionPolicy: Retain
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        ports:
          - name: client
            containerPort: 4222
          - name: monitor
            containerPort: 8222
        partOf: hanzo-platform

  # ---------------------------------------------------------------------------
  # Services (Deployments) -- all 2 replicas, RollingUpdate, PDB minAvailable=1
  # ---------------------------------------------------------------------------
  services:
    # ===== Core Infrastructure =====

    # -- IAM (Identity) --
    - name: iam
      spec:
        image:
          repository: ghcr.io/hanzoai/iam
          tag: latest
          pullPolicy: Always
        replicas: 2
        ports:
          - name: http
            containerPort: 8000
        strategy: RollingUpdate
        partOf: hanzo-platform
        component: identity
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        livenessProbe:
          path: /health
          port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          path: /health
          port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        pdb:
          enabled: true
          minAvailable: 1
        envFrom:
          - secretRef:
              name: iam-secrets
        kmsSecrets:
          - hostAPI: https://kms.hanzo.ai/api
            projectSlug: hanzo
            envSlug: production
            secretsPath: /iam
            credentialsRef:
              name: kms-credentials
              namespace: hanzo
            resyncInterval: 60
            managedSecretName: iam-secrets
        ingress:
          enabled: true
          hosts:
            - hanzo.id
            - lux.id
            - zoo.id
            - pars.id
          ingressClassName: ingress
          tls: true
          clusterIssuer: letsencrypt-prod

    # -- KMS (Secrets Management) --
