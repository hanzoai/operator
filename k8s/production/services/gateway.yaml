apiVersion: hanzo.ai/v1alpha1
kind: HanzoService
metadata:
  name: gateway
  namespace: hanzo
  labels:
    app.kubernetes.io/part-of: hanzo-platform
    app.kubernetes.io/component: gateway
spec:
  image:
    repository: ghcr.io/hanzoai/gateway
    tag: latest
    pullPolicy: Always
  replicas: 2
  ports:
    - name: http
      containerPort: 8080
  strategy: RollingUpdate
  partOf: hanzo-platform
  component: gateway
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  livenessProbe:
    path: /__health
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    path: /__health
    port: 8080
    initialDelaySeconds: 3
    periodSeconds: 10
  pdb:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: true
    hosts:
      - api.hanzo.ai
    ingressClassName: ingress
    tls: true
    clusterIssuer: letsencrypt-prod
