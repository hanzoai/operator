apiVersion: hanzo.ai/v1alpha1
kind: HanzoService
metadata:
  name: kms
  namespace: hanzo
  labels:
    app.kubernetes.io/part-of: hanzo-platform
    app.kubernetes.io/component: secrets
spec:
  image:
    repository: ghcr.io/hanzoai/kms
    tag: latest
    pullPolicy: Always
  replicas: 2
  ports:
    - name: http
      containerPort: 8080
  strategy: RollingUpdate
  partOf: hanzo-platform
  component: secrets
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  livenessProbe:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    path: /health
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  pdb:
    enabled: true
    minAvailable: 1
  envFrom:
    - secretRef:
        name: kms-secrets
  ingress:
    enabled: true
    hosts:
      - kms.hanzo.ai
    ingressClassName: ingress
    tls: true
    clusterIssuer: letsencrypt-prod
