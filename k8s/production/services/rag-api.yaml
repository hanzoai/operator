apiVersion: hanzo.ai/v1alpha1
kind: HanzoService
metadata:
  name: rag-api
  namespace: hanzo
  labels:
    app.kubernetes.io/part-of: hanzo-platform
    app.kubernetes.io/component: rag-api
spec:
  image:
    repository: ghcr.io/hanzoai/rag-api
    tag: latest
    pullPolicy: Always
  replicas: 2
  ports:
    - name: http
      containerPort: 8000
  strategy: RollingUpdate
  partOf: hanzo-platform
  component: rag-api
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  livenessProbe:
    path: /health
    port: 8000
    initialDelaySeconds: 15
    periodSeconds: 15
  readinessProbe:
    path: /health
    port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
  pdb:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: true
    hosts:
      - rag.hanzo.ai
    ingressClassName: ingress
    tls: true
    clusterIssuer: letsencrypt-prod
