apiVersion: hanzo.ai/v1alpha1
kind: HanzoService
metadata:
  name: iam
  namespace: hanzo
  labels:
    app.kubernetes.io/part-of: hanzo-platform
    app.kubernetes.io/component: identity
spec:
  image:
    repository: ghcr.io/hanzoai/iam
    tag: latest
    pullPolicy: Always
  replicas: 2
  ports:
    - name: http
      containerPort: 8000
  strategy: RollingUpdate
  partOf: hanzo-platform
  component: identity
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  livenessProbe:
    path: /health
    port: 8000
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    path: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
  pdb:
    enabled: true
    minAvailable: 1
  envFrom:
    - secretRef:
        name: iam-secrets
  kmsSecrets:
    - hostAPI: https://kms.hanzo.ai/api
      projectSlug: hanzo
      envSlug: production
      secretsPath: /iam
      credentialsRef:
        name: kms-credentials
        namespace: hanzo
      resyncInterval: 60
      managedSecretName: iam-secrets
  ingress:
    enabled: true
    hosts:
      - hanzo.id
      - lux.id
      - zoo.id
      - pars.id
    ingressClassName: ingress
    tls: true
    clusterIssuer: letsencrypt-prod
