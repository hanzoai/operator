apiVersion: hanzo.ai/v1alpha1
kind: HanzoService
metadata:
  name: status
  namespace: hanzo
  labels:
    app.kubernetes.io/part-of: hanzo-platform
    app.kubernetes.io/component: status
spec:
  image:
    repository: ghcr.io/hanzoai/status
    tag: latest
    pullPolicy: Always
  replicas: 2
  ports:
    - name: http
      containerPort: 3000
  strategy: RollingUpdate
  partOf: hanzo-platform
  component: status
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  livenessProbe:
    path: /
    port: 3000
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    path: /
    port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10
  pdb:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: true
    hosts:
      - status.hanzo.ai
    ingressClassName: ingress
    tls: true
    clusterIssuer: letsencrypt-prod
